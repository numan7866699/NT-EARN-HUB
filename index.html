<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT Global Hub | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view-page { display: none; width: 100%; }
        .active-view { display: block; }
        .premium-dark { background: #0a0a0a; }
        .glass-panel { background: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="premium-dark text-gray-200 font-sans h-screen overflow-hidden">

<!-- Main App Container -->
<div id="app-section" class="max-w-md mx-auto h-full flex flex-col">
    
    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto p-4 pb-20">
        
        <!-- DASHBOARD -->
        <div id="view-dashboard" class="view-page active-view space-y-4">
            <h2 class="text-lg font-black text-white">Welcome, Numan</h2>
            <div class="glass-panel p-6 rounded-3xl text-center">
                <p class="text-[10px] text-gray-400 uppercase">Total Balance</p>
                <h3 class="text-4xl font-black text-cyan-400 mt-2">$0.00</h3>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openTaskList()" class="bg-gray-900 p-4 rounded-2xl border border-gray-800 text-xs text-left">📺 Watch Ads</button>
                <button onclick="openTaskList()" class="bg-gray-900 p-4 rounded-2xl border border-gray-800 text-xs text-left">🎬 Videos</button>
            </div>
        </div>

        <!-- WALLET -->
        <div id="view-wallet" class="view-page space-y-4">
            <h2 class="text-lg font-bold text-white mb-4">Withdraw Funds</h2>
            <div class="glass-panel p-6 rounded-3xl space-y-4">
                <select class="w-full bg-black p-4 rounded-xl border border-gray-800 text-sm text-gray-300">
                    <option>Select Network (BEP-20 / TRC-20)</option>
                    <option>USDT BEP-20</option>
                    <option>USDT TRC-20</option>
                </select>
                <input type="text" placeholder="Enter Wallet Address" class="w-full bg-black p-4 rounded-xl border border-gray-800 text-sm">
                <input type="number" placeholder="Amount ($30 - $500)" class="w-full bg-black p-4 rounded-xl border border-gray-800 text-sm">
                <button onclick="alert('Request sent')" class="w-full bg-cyan-600 py-4 rounded-xl font-bold">Request Withdrawal</button>
            </div>
        </div>

        <!-- REFERRALS -->
        <div id="view-referrals" class="view-page space-y-4">
            <h2 class="text-lg font-bold text-white">Team Rewards</h2>
            <div class="glass-panel p-6 rounded-3xl">
                <p class="text-xs text-gray-400">Your Referral Link:</p>
                <input type="text" readonly value="ntglobalhub.com/ref/me" class="w-full bg-black p-3 mt-2 rounded border border-gray-800 text-xs text-cyan-400 text-center">
            </div>
        </div>

        <!-- PROFILE -->
        <div id="view-profile" class="view-page space-y-4">
            <h2 class="text-lg font-bold text-white">Profile</h2>
            <div class="glass-panel p-6 rounded-3xl">
                <div class="text-sm">Account Status: <span class="text-green-500 font-bold">Verified</span></div>
                <button class="mt-4 w-full bg-gray-800 p-3 rounded-xl text-xs">Edit Details</button>
            </div>
        </div>

        <!-- SUPPORT -->
        <div id="view-contact" class="view-page space-y-4">
            <h2 class="text-lg font-bold text-white">Support</h2>
            <div class="glass-panel p-6 rounded-3xl space-y-3">
                <input type="text" placeholder="Subject" class="w-full bg-black p-3 rounded-xl border border-gray-800 text-sm">
                <textarea placeholder="Your Message" class="w-full bg-black p-3 rounded-xl border border-gray-800 text-sm h-32"></textarea>
                <button class="w-full bg-cyan-600 py-3 rounded-xl font-bold">Send Message</button>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-gray-950 border-t border-gray-800 p-4 flex justify-between items-center h-16">
        <button onclick="switchTab('dashboard')"><i class="fa-solid fa-house"></i></button>
        <button onclick="switchTab('wallet')"><i class="fa-solid fa-wallet"></i></button>
        <button onclick="switchTab('referrals')"><i class="fa-solid fa-users"></i></button>
        <button onclick="switchTab('profile')"><i class="fa-solid fa-user"></i></button>
        <button onclick="switchTab('contact')"><i class="fa-solid fa-envelope"></i></button>
    </nav>
</div>

<script>
    function switchTab(tabId) {
        // Hide all
        document.querySelectorAll('.view-page').forEach(page => {
            page.classList.remove('active-view');
        });
        // Show target
        document.getElementById('view-' + tabId).classList.add('active-view');
    }
    
    function openTaskList() {
        alert("Task list loading...");
    }
</script>
</body>
</html>
