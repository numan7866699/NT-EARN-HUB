<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT Earn Hub | Secure Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fancy-blur { backdrop-filter: blur(12px); }
        .modal-animate { animation: modalIn 0.2s ease-out forwards; }
        @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen">

<div id="custom-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 fancy-blur">
    <div class="bg-gray-900 w-full max-w-sm rounded-3xl border border-gray-800 p-6 shadow-2xl modal-animate text-center">
        <h3 id="modal-title" class="text-white font-bold">Notification</h3>
        <p id="modal-message" class="text-xs text-gray-400 mt-2"></p>
        <button onclick="closeModal()" class="mt-6 w-full bg-cyan-600 text-white py-3 rounded-xl text-xs font-bold">Acknowledge</button>
    </div>
</div>

<div id="auth-ui" class="max-w-md mx-auto p-6 pt-20">
    <h2 class="text-3xl font-black text-center text-cyan-400 mb-8">NT EARN HUB</h2>
    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 space-y-4">
        <div id="signup-fields" class="hidden space-y-4">
            <input type="text" id="fullname" placeholder="Full Name" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
            <input type="text" id="username" placeholder="Username" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
        </div>
        <input type="email" id="email" placeholder="Email Address" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
        <input type="password" id="password" placeholder="Password" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
        <button onclick="handleAuth()" id="auth-btn" class="w-full bg-cyan-600 py-3.5 rounded-xl font-bold text-white">Sign In</button>
        <button onclick="toggleSignup()" class="w-full text-gray-500 text-xs font-bold underline">Switch to Sign Up / Sign In</button>
    </div>
</div>

<div id="app-ui" class="hidden max-w-md mx-auto min-h-screen bg-gray-950 p-6">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-lg font-black text-white">DASHBOARD</h1>
        <button onclick="safelyLogOut()" class="text-red-400 text-xs"><i class="fa-solid fa-power-off"></i></button>
    </header>

    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 mb-6">
        <p class="text-xs text-gray-400">Total Balance</p>
        <h3 class="text-3xl font-black text-cyan-400" id="balance-display">$0.00</h3>
    </div>

    <div id="task-list" class="space-y-4">
        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
            <div>
                <h4 class="text-xs font-bold text-white">Premium Ad Node</h4>
                <p class="text-[10px] text-gray-500">Reward: $0.15 | Time: 30s</p>
            </div>
            <button onclick="executeTask(0.15, 'https://google.com')" class="bg-cyan-600 px-4 py-2 rounded-xl text-xs font-bold text-white">Launch</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLEnhC545LNW9GyKfWaJPJCrOKUotYqpY", authDomain: "nt-earn-hub.firebaseapp.com", databaseURL: "https://nt-earn-hub-default-rtdb.firebaseio.com", projectId: "nt-earn-hub", storageBucket: "nt-earn-hub.firebasestorage.app", messagingSenderId: "606638253911", appId: "1:606638253911:web:77a1c0323c2e70afcc4012" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const isSignup = !document.getElementById('signup-fields').classList.contains('hidden');

        if(isSignup) {
            auth.createUserWithEmailAndPassword(email, pass).then(cred => {
                cred.user.sendEmailVerification();
                db.ref('users/' + cred.user.uid).set({ fullname: document.getElementById('fullname').value, username: document.getElementById('username').value, balance: 0 });
                showModal('Success', 'Verification email sent. Please check your inbox before logging in.');
            }).catch(e => showModal('Error', e.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass).then(cred => {
                if(!cred.user.emailVerified) {
                    showModal('Warning', 'Email not verified. Please verify your email first.');
                    auth.signOut();
                }
            }).catch(e => showModal('Error', e.message));
        }
    }

    function executeTask(reward, url) {
        showModal('Wait', 'Task Initiated. Timer (30s) running...');
        window.open(url, '_blank');
        
        setTimeout(() => {
            const user = auth.currentUser;
            if(user) {
                db.ref('users/' + user.uid + '/balance').transaction(bal => (bal || 0) + reward);
                showModal('Reward', 'Timer complete! $'+reward+' has been credited to your balance.');
            }
        }, 30000);
    }

    auth.onAuthStateChanged(user => {
        if(user && user.emailVerified) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            db.ref('users/' + user.uid + '/balance').on('value', s => {
                document.getElementById('balance-display').innerText = '$' + (s.val() || 0).toFixed(2);
            });
        }
    });

    function toggleSignup() { document.getElementById('signup-fields').classList.toggle('hidden'); document.getElementById('auth-btn').innerText = document.getElementById('signup-fields').classList.contains('hidden') ? 'Sign In' : 'Register Account'; }
    function showModal(t, m) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-message').innerText = m; document.getElementById('custom-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }
    function safelyLogOut() { auth.signOut(); window.location.reload(); }
</script>
</body>
</html>
