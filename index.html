<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT Earn Hub | Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fancy-blur { backdrop-filter: blur(12px); }
        .modal-animate { animation: modalIn 0.2s ease-out forwards; }
        @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen">

<!-- Custom Dialog Engine -->
<div id="custom-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 fancy-blur">
    <div class="bg-gray-900 w-full max-w-sm rounded-3xl border border-gray-800 p-6 shadow-2xl modal-animate text-center">
        <h3 id="modal-title" class="text-white font-black">Notification</h3>
        <p id="modal-message" class="text-xs text-gray-400 mt-2"></p>
        <button onclick="closeModal()" class="mt-6 w-full bg-cyan-600 text-white py-3 rounded-xl text-xs font-bold">Acknowledge</button>
    </div>
</div>

<!-- Authentication UI -->
<div id="auth-ui" class="p-6 pt-12 max-w-md mx-auto">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">NT EARN HUB</h2>
    </div>
    <div class="bg-gray-900/80 p-6 rounded-3xl border border-gray-800 space-y-4">
        <div id="signup-fields" class="hidden space-y-4">
            <input type="text" id="fullname" placeholder="Full Name" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
            <input type="text" id="username" placeholder="Username" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
        </div>
        <input type="email" id="email" placeholder="Email Address" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
        <input type="password" id="password" placeholder="Password" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-sm text-white">
        <button onclick="login()" id="auth-btn" class="w-full bg-cyan-600 py-3.5 rounded-xl font-bold text-white">Sign In</button>
        <button onclick="toggleSignup()" class="w-full text-gray-500 text-xs font-bold underline">Switch to Register / Login</button>
    </div>
</div>

<!-- Main App UI -->
<div id="app-ui" class="hidden flex flex-col h-screen max-w-md mx-auto overflow-hidden">
    <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
        <!-- Dashboard View -->
        <div id="view-dashboard">
            <h2 class="text-xl font-black text-white mb-4">Welcome Back</h2>
            <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 mb-6">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Available Balance</p>
                <h3 class="text-3xl font-black text-cyan-400" id="balance-display">$0.00</h3>
            </div>
            <div id="task-list" class="space-y-3">
                <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
                    <div><h4 class="text-xs font-bold text-white">Premium Ad Node</h4><p class="text-[10px] text-gray-500">Reward: $0.15 | Timer: 30s</p></div>
                    <button onclick="executeTask(0.15, 'https://google.com')" class="bg-cyan-600 px-4 py-2 rounded-xl text-xs font-bold text-white">Launch</button>
                </div>
            </div>
        </div>

        <!-- Wallet View (Placeholder) -->
        <div id="view-wallet" class="hidden">
            <h3 class="text-base font-bold text-white">Withdraw Assets</h3>
            <p class="text-xs text-gray-500 mt-2">Withdrawals are secure.</p>
        </div>

        <!-- Referral View -->
        <div id="view-referrals" class="hidden">
            <h3 class="text-base font-bold text-white">Invite & Earn</h3>
            <div class="bg-gray-900 p-6 rounded-3xl mt-4">
                <p class="text-[10px] text-gray-400">Total Referral Earnings</p>
                <h3 class="text-2xl font-black text-cyan-400" id="ref-total-earnings">$0.00</h3>
            </div>
            <div id="referrals-list" class="mt-4 space-y-2"></div>
        </div>

        <!-- Profile View -->
        <div id="view-profile" class="hidden text-center">
            <h4 class="text-base font-bold text-white" id="profile-fullname">User</h4>
            <button onclick="safelyLogOut()" class="mt-4 text-red-400 text-xs font-bold">Log Out</button>
        </div>
    </main>

    <!-- Navigation Dock -->
    <nav class="bg-gray-900 border-t border-gray-800 px-4 py-3 fixed bottom-0 w-full max-w-md">
        <div class="flex justify-between text-gray-500">
            <button onclick="switchView('dashboard')"><i class="fa-solid fa-house"></i></button>
            <button onclick="switchView('wallet')"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="switchView('referrals')"><i class="fa-solid fa-user-group"></i></button>
            <button onclick="switchView('profile')"><i class="fa-solid fa-user"></i></button>
        </div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLEnhC545LNW9GyKfWaJPJCrOKUotYqpY", authDomain: "nt-earn-hub.firebaseapp.com", databaseURL: "https://nt-earn-hub-default-rtdb.firebaseio.com", projectId: "nt-earn-hub", storageBucket: "nt-earn-hub.firebasestorage.app", messagingSenderId: "606638253911", appId: "1:606638253911:web:77a1c0323c2e70afcc4012" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Verification + Auth
    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const isSignup = !document.getElementById('signup-fields').classList.contains('hidden');

        if(isSignup) {
            auth.createUserWithEmailAndPassword(email, pass).then(cred => {
                cred.user.sendEmailVerification();
                db.ref('users/' + cred.user.uid).set({ fullname: document.getElementById('fullname').value, balance: 0, refEarnings: 0 });
                showModal('Success', 'Verification link sent. Please verify your email.');
            }).catch(e => showModal('Error', e.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass).then(cred => {
                if(!cred.user.emailVerified) {
                    showModal('Warning', 'Email not verified. Check inbox.');
                    auth.signOut();
                }
            }).catch(e => showModal('Error', e.message));
        }
    }

    // Task Logic with 30s Timer
    function executeTask(reward, url) {
        showModal('Wait', 'Timer active (30s). Please stay on the page.');
        window.open(url, '_blank');
        setTimeout(() => {
            const user = auth.currentUser;
            if(user) {
                db.ref('users/' + user.uid + '/balance').transaction(bal => (bal || 0) + reward);
                showModal('Reward', 'Task complete! $' + reward + ' added.');
            }
        }, 30000);
    }

    // Navigation and Logic
    auth.onAuthStateChanged(user => {
        if(user && user.emailVerified) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            db.ref('users/' + user.uid).on('value', s => {
                const data = s.val();
                if(data) {
                    document.getElementById('balance-display').innerText = '$' + (data.balance || 0).toFixed(2);
                    document.getElementById('ref-total-earnings').innerText = '$' + (data.refEarnings || 0).toFixed(2);
                    document.getElementById('profile-fullname').innerText = data.fullname || "User";
                }
            });
        }
    });

    function switchView(v) {
        ['dashboard', 'wallet', 'referrals', 'profile'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
        document.getElementById('view-'+v).classList.remove('hidden');
    }
    function toggleSignup() { document.getElementById('signup-fields').classList.toggle('hidden'); document.getElementById('auth-btn').innerText = document.getElementById('signup-fields').classList.contains('hidden') ? 'Sign In' : 'Register'; }
    function showModal(t, m) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-message').innerText = m; document.getElementById('custom-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }
    function safelyLogOut() { auth.signOut(); window.location.reload(); }
</script>
</body>
</html>
